# 실습 ⑧: NodePort로 외부 노출
# 적용:  kubectl apply -f web-svc.yaml
# 확인:  minikube service web-svc --url
#        curl $(minikube service web-svc --url)

apiVersion: v1
kind: Service
metadata:
  name: web-svc
spec:
  type: NodePort
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
