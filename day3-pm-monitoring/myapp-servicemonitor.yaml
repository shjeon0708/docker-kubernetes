# 실습: myapp을 Prometheus 모니터링 대상에 포함시키기
#
# 사전 준비: kube-prometheus-stack이 monitoring 네임스페이스에 설치되어 있어야 합니다.
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace
#
# 적용:  kubectl apply -f myapp-servicemonitor.yaml -n monitoring
#
# 주의: labels.release 값은 위 helm install 시 지정한 릴리스 이름(monitoring)과
#       반드시 일치해야 Prometheus가 이 ServiceMonitor를 인식합니다.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: myapp
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: myapp
  namespaceSelector:
    any: true
  endpoints:
  - port: http
