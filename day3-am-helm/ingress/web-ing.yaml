# 실습 ②③: Ingress 규칙 작성과 검증
# 사전 준비: ingress-nginx 컨트롤러가 설치되어 있어야 합니다.
# 적용:  kubectl apply -f web-ing.yaml
# 확인:  curl -H 'Host: web.edu.local' http://<노드IP>:<컨트롤러NodePort>

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ing
spec:
  rules:
  - host: web.edu.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-svc
            port:
              number: 80
